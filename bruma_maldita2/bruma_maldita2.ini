description.Spanish=<color=#FFD700>✧･ﾟ</color> <color=#00FF7F>LA</color> <color=#7CFC00>BRUMA</color> <color=#66CDAA>DEMONÍACA</color> <color=#FFD700>･ﾟ✧</color>\n<color=#BDB76B>━━━━ Parte II ━━━━</color>\n<color=#E9967A>Una niebla verdosa y antinatural envuelve vuestro barco mientras navegáis hacia aguas desconocidas. El Capitán <b>Jeremiah Bloodmoon</b>, un hombre atormentado por sus propios demonios, os guía entre delirios alcohólicos hacia el lugar donde abandonó a <b>Frank Collins</b>.</color>\n\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<color=#FF8C00>⚠ AVISO IMPORTANTE ⚠</color>\n<color=#FFD700>Esta aventura contiene una cantidad considerable de texto narrativo y diálogos. Se recomienda tomar notas y prestar atención a los detalles.</color>\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<i>▸ La aventura se divide en 4 capítulos:\n⌛ Podéis jugar 2 capítulos, guardar, y continuar con los otros 2 más adelante\n☠️ Múltiples finales posibles >15\n Enigmas desafiantes que pondrán a prueba vuestra astucia\n Rica en narrativa y diálogos significativos</i>\n<color=#BDB76B>⊱⋆⊰</color> <b>VALORACIÓN</b> <color=#BDB76B>⊱⋆⊰</color>\n<color=#FFD700>⌛ Duración:</color>  ★★★★☆  <i>「Extensa」</i>\n<color=#FFD700> Texto:</color>     ★★★★★  <i>「Muy Alto」</i>\n<color=#FFD700>⚔️ Combate:</color>   ★★★★☆  <i>「Moderado」</i>\n<color=#FFD700> Enigmas:</color>   ★★★★★  <i>「Desafiante」</i>\n<color=#FFD700> Historia:</color>  ★★★★☆  <i>「Compleja」</i>\n\n<color=#7D90A6>Nota: Se recomienda tomar notas durante la partida para seguir mejor la trama y resolver los enigmas.</color>\n
description.English=<color=#FFD700>✧･ﾟ</color> <color=#00FF7F>THE</color> <color=#7CFC00>DEMONIC</color> <color=#66CDAA>MIST</color> <color=#FFD700>･ﾟ✧</color>\n<color=#BDB76B>━━━━ Part II ━━━━</color>\n<color=#E9967A>An unnatural greenish fog envelops your ship as you navigate into unknown waters. Captain <b>Jeremiah Bloodmoon</b>, a man tormented by his own demons, guides you through alcoholic delusions to the place where he abandoned <b>Frank Collins</b>.</color>\n\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<color=#FF8C00>⚠ IMPORTANT WARNING ⚠</color>\n<color=#FFD700>This adventure contains a considerable amount of narrative text and dialogues. It is recommended to take notes and pay attention to details.</color>\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<i>▸ The adventure is divided into 4 chapters:\n⌛ You can play 2 chapters, save, and continue with the other 2 later\n☠️ Multiple possible endings >15\n Challenging puzzles that will test your ingenuity\n Rich in narrative and meaningful dialogue</i>\n<color=#BDB76B>⊱⋆⊰</color> <b>RATING</b> <color=#BDB76B>⊱⋆⊰</color>\n<color=#FFD700>⌛ Duration:</color> ★★★★☆ <i>「Extensive」</i>\n<color=#FFD700> Text:</color> ★★★★★ <i>「Very High」</i>\n<color=#FFD700>⚔️ Combat:</color> ★★★★☆ <i>「Moderate」</i>\n<color=#FFD700> Puzzles:</color> ★★★★★ <i>「Challenging」</i>\n<color=#FFD700> Story:</color> ★★★★☆ <i>「Complex」</i>\n\n<color=#7D90A6>Note: It is recommended to take notes during the game to better follow the plot and solve the puzzles.</color>\n
description.Polish=<color=#FFD700>✧･ﾟ</color>  <color=#7CFC00>DEMONICZNA</color> <color=#66CDAA>MGŁA</color> <color=#FFD700>･ﾟ✧</color>\n<color=#BDB76B>━━━━ Część II ━━━━</color>\n<color=#E9967A>Nienaturalna zielonkawa mgła spowija wasz statek, płynący przez nieznane wody. Kapitan Jeremiah Bloodmoon, człowiek dręczony przez własne demony, prowadzi was przez alkoholowe urojenia do miejsca, w którym porzucił Franka Collinsa.</color>\n\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<color=#FF8C00>⚠ UWAGA ⚠</color>\n<color=#FFD700>Ten scenariusz zawiera sporo tekstu narracyjnego i dialogów. Zaleca się robienie notatek i zwracanie uwagi na szczegóły.</color>\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<i>▸ Scenariusz podzielony jest na 4 rozdziały:\n⌛ Możecie rozegrać 2 rozdziały , zapisać grę, a 2 kolejne rozegrać później.\n☠️ Wiele możliwych zakończeń >15\n Trudne łamigłówki, które sprawdzą Twoją pomysłowość\n Bogaty w narrację i znaczące dialogi</i>\n<color=#BDB76B>⊱⋆⊰</color> <b>OCENA</b> <color=#BDB76B>⊱⋆⊰</color>\n<color=#FFD700>⌛ Czas trwania:</color> ★★★★☆ <i>「Długi」</i>\n<color=#FFD700> Ilość tekstu:</color> ★★★★★ <i>「Bardzo duża」</i>\n<color=#FFD700>⚔️ Walka:</color> ★★★★☆ <i>「Umiarkowanie」</i>\n<color=#FFD700> Zagadki:</color> ★★★★★ <i>「Wymagające」</i>\n<color=#FFD700> Historia:</color> ★★★★☆ <i>「Złożona」</i>\n\n<color=#7D90A6>Uwaga: Zalecane jest robienie notatek w trakcie rozgrywki dla łatwiejszego śledzenia fabuły i rozwiązywania łamigłówek.</color>\n
description.French=<color=#FFD700>✧･ﾟ</color> <color=#00FF7F>LA</color> <color=#7CFC00>BRUME</color> <color=#66CDAA>DÉMONIAQUE</color> <color=#FFD700>･ﾟ✧</color>\n<color=#BDB76B>━━━━ Partie II ━━━━</color>\n\n<color=#E9967A>Une brume verdâtre et surnaturelle enveloppe votre navire tandis que vous naviguez vers des eaux inconnues. Le Capitaine <b>Jeremiah Bloodmoon</b>, un homme tourmenté par ses propres démons, vous guide parmi des délires alcoolisés vers l'endroit où il a abandonné <b>Frank Collins</b>.</color>\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<color=#FF8C00>⚠ AVIS IMPORTANT ⚠</color>\n<color=#FFD700>Cette aventure contient une quantité considérable de texte narratif et de dialogues. Il est recommandé de prendre des notes et de prêter attention aux détails.</color>\n<color=#BDB76B>━━━━⊱⋆⊰━━━━</color>\n<i>▸ L'aventure se divise en 4 chapitres :\n⌛ Vous pouvez jouer 2 chapitres, sauvegarder, et continuer les 2 autres plus tard\n☠️ Multiples fins possibles >15\n Énigmes stimulantes qui mettront à l'épreuve votre ruse\n Riche en narration et dialogues significatifs</i>\n\n<color=#BDB76B>⊱⋆⊰</color> <b>ÉVALUATION</b> <color=#BDB76B>⊱⋆⊰</color>\n<color=#FFD700>⌛ Durée :</color>  ★★★★☆  <i>「Étendue」</i>\n<color=#FFD700> Texte :</color>      ★★★★★  <i>「Très Élevé」</i>\n<color=#FFD700>⚔️ Combat :</color>    ★★★★☆  <i>「Modéré」</i>\n<color=#FFD700> Énigmes :</color>    ★★★★★  <i>「Stimulant」</i>\n<color=#FFD700> Histoire :</color>  ★★★★☆  <i>「Complexe」</i>\n\n<color=#7D90A6>Note : Il est recommandé de prendre des notes pendant la partie pour mieux suivre l'intrigue et résoudre les énigmes.</color>
